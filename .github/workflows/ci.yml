name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build-ci -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build-ci --config Debug --parallel

      - name: Test
        run: ctest --test-dir build-ci -C Debug --output-on-failure
